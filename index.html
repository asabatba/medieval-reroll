<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medieval Reroll</title>
<meta name="description" content="A deterministic history engine: resolve a whole medieval village's genealogy from a single address, then browse any life in it — births, marriages, deaths, and kin, all rooted in real medieval demography.">
<meta property="og:title" content="Medieval Reroll">
<meta property="og:description" content="A deterministic history engine: resolve a whole medieval village's genealogy from a single address, then browse any life in it.">
<meta property="og:type" content="website">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<script>
(() => {
  try {
    const saved = localStorage.getItem("medieval-reroll-theme");
    const theme = saved === "dark" || saved === "light" ? saved : matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    document.documentElement.dataset.theme = theme;
  } catch {
    document.documentElement.dataset.theme = "dark";
  }
})();
</script>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">MEDIEVAL <b>✠</b> REROLL</div>
    <div class="controls">
      <div class="langsw" id="langsw"></div>
      <div class="themesw" id="themesw"></div>
      <div class="worldseed" id="worldseed"></div>
      <input class="seedbox" id="seedbox" aria-label="Record locator" aria-describedby="locator-error">
      <button class="ghost" type="button" id="replay"></button>
      <button class="roll" type="button" id="roll"></button>
      <button class="ghost" type="button" id="new-world"></button>
    </div>
    <p class="locator-error" id="locator-error" role="alert"></p>
  </header>
  <p class="intro" id="intro"></p>
  <p class="sr-only" id="status" role="status"></p>
  <main id="out"></main>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
